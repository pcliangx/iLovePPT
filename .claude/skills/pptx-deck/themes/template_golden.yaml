name: template_golden
description: "黄金商务模板 · 38 page native · 3 独有 layout(process_flow/pyramid/radial)· 其他 14 layout 共享 tech_blue SSOT"

# template_golden · 纯 yaml theme(色板跟 tech_blue 一致 · 3 独有 layout:process_flow/pyramid/radial)。
# colors 是权威(load_theme 直接读 yaml,无 .pptx 运行时提取);layouts 14 个共享 tech_blue 命名 + 3 个独有。
colors:
  brand_primary: "#0A52BF"
  brand_dark:    "#0B2A4A"
  brand_tint:    "#E6F0FC"
  accent:        "#007A6D"
  muted_blue:     "#4A7AB5"
  muted_sand:     "#C9B68E"
  muted_sage:     "#7E9D91"
  muted_terra:    "#B56F5C"
  muted_lavender: "#9B8CBA"
  muted_ochre:    "#C99E4F"

fonts:
  ea: "Microsoft YaHei"
  latin: "Helvetica Neue"
  num: "Helvetica Neue"
  title_size_pt: 28
  body_size_pt: 18

# 17 enum · 共享 tech_blue 14 + 独有 3(process_flow/pyramid/radial)
layouts:
  cover: make_cover
  toc: make_toc
  section_divider: make_section_divider
  summary: make_summary
  closing: make_closing
  quote: null
  single_focus: make_single_focus
  cards: make_cards
  bullet_list: make_bullet_list
  data: null
  timeline: null
  pyramid: make_pyramid       # ★ template_golden 独有
  venn: null
  radial: make_radial         # ★ template_golden 独有
  process_flow: make_process_flow  # ★ template_golden 独有
  quadrant: make_matrix_2x2
  comparison: make_compare
  # 历史 layout 名
  compare: make_compare
  compare_pk: make_compare_pk
  matrix_2x2: make_matrix_2x2
  table: make_table
  pic_text: make_pic_text

implementation:
  tier2: true
  tier3_fallback: tech_blue
  module_path: "template_golden"      # themes/template_golden.py
