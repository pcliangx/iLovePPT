id: pyramid-3-layer
name: "3 层金字塔"
category: hierarchy

layout_type: pyramid
variant: pyramid-3

content_intent:
  - 3 层金字塔结构(底层 → 中层 → 顶层)
  - 每层放层级名 + 简短说明
  - 强调"基础 → 核心 → 顶尖"的层级递进
when_to_use:
  - 战略框架 3 层(基础 / 核心 / 卓越)
  - 团队架构 3 层(执行层 / 管理层 / 决策层)
  - 任何"3 阶段层级支撑"结构
when_not_to_use:
  - 层数 ≠ 3(选 pyramid-4/5)
  - 平级而非层级(改 cards-3-*)
  - 强调收敛而非层级(改 process-funnel-3)
keywords:
  - 金字塔
  - 3 层
  - 层级
  - 三层
  - hierarchy
  - 三角
  - 3 阶
  - 支撑

matches_iloveppt_layout: null
fallback_rendering:
  method: diagram
  notes: |
    draw.io 推荐:3 个 trapezoid 堆叠,底层最宽(100%),
    中层 65%,顶层 35%(顶层可用三角);每层右侧挂层级名 + 描述;
    BRAND_PRIMARY 渐变(底深顶浅)。
