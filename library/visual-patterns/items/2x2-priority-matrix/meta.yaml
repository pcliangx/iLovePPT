id: 2x2-priority-matrix
name: "2x2 优先级矩阵"
category: comparison

layout_type: quadrant
variant: quadrant-priority-matrix

content_intent:
  - 2x2 矩阵, X 轴(重要 / 不重要) × Y 轴(紧急 / 不紧急)
  - 4 象限每个放对应优先级名 + 行动方针(立即做 / 计划做 / 委派 / 删除)
  - 散点可以散落具体任务名
when_to_use:
  - Eisenhower 矩阵 / 时间管理优先级
  - 任务优先级排序(重要紧急 vs 重要不紧急)
  - 任何 2 维度评估打分场景
when_not_to_use:
  - 维度 ≠ 2(改 cards-* / bullet)
  - 内容是流程(改 process-* / timeline)
  - 强调 SWOT 框架(改 quadrant-swot)
keywords:
  - 2x2
  - 优先级
  - 优先级矩阵
  - 重要紧急
  - Eisenhower
  - 时间管理
  - 任务排序
  - priority matrix
  - quadrant
  - 决策矩阵

matches_iloveppt_layout: null
fallback_rendering:
  method: diagram
  notes: |
    draw.io 推荐:slide 中央 2x2 网格,X/Y 轴标签明确(重要度 / 紧急度);
    每 cell 内放象限标题 + 行动方针;可加散点圆表示具体任务;
    BRAND_PRIMARY 配色,第 Ⅰ 象限(右上)用 ACCENT 强调"立即做"。
