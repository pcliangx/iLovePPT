id: radial-5-spoke
name: "5 辐射(中心 + 5 节点)"
category: relationship

layout_type: radial
variant: radial-5-spoke

content_intent:
  - 1 个中心节点 + 5 个外围节点等距分布
  - 中心放主题词,辐射出 5 个分支(每分支 1 节点)
  - 表达 "1 中心 → N 关联" 的辐射关系
when_to_use:
  - 1 个核心理念辐射 5 个支撑要素
  - hub-and-spoke 架构(1 总部 + 5 区域)
  - 5 个利益相关方围绕同一议题
when_not_to_use:
  - 辐射数 ≠ 5(选 radial-3/4/6-spoke)
  - 节点是层级关系(改 pyramid-*)
  - 节点是流程关系(改 process-*)
keywords:
  - 辐射
  - 5 辐射
  - 5 节点
  - hub-spoke
  - 中心
  - radial
  - 5 分支
  - 5 关联
  - 放射状
  - 中心辐射

matches_iloveppt_layout: null
fallback_rendering:
  method: diagram
  notes: |
    draw.io 推荐:slide 中央一个大 ellipse 放主题词,周围 5 个小 ellipse
    沿圆周等距分布(72° 间隔);中心向 5 个外围节点画 connector;
    BRAND_PRIMARY 中心高亮,辐射节点用 BRAND_TINT 弱化。
