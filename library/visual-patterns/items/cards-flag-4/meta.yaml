id: cards-flag-4
name: "4 个 flag 卡片(数字 + 标题 + 正文)"
category: comparison

layout_type: cards
variant: cards-4-icon

content_intent:
  - 4 张并列卡片,每张顶部有"flag / 旗帜 / 编号徽章"
  - 每卡:大号数字 / icon + 卡片标题 + 1-2 行说明文
  - 强调"4 个并列要点"的对比 / 罗列
when_to_use:
  - 4 个核心特性 / 4 个价值主张并列展示
  - 4 个数据指标(KPI)并列卡片
  - 4 个团队成员 / 4 个产品功能横向罗列
when_not_to_use:
  - 卡片数 ≠ 4(选 cards-2/3/6-*)
  - 卡片是流程关系(改 process-arrow-*)
  - 卡片是层级关系(改 pyramid-*)
keywords:
  - 4 卡片
  - flag
  - 旗帜
  - 4 张卡
  - 4 个
  - 卡片对比
  - 横向卡片
  - 4 项
  - 数字卡片
  - icon 卡片
  - 4 特性
  - 4 价值

matches_iloveppt_layout: null
fallback_rendering:
  method: diagram
  notes: |
    draw.io 推荐:4 个圆角矩形卡片横向并列,卡顶部各挂一个"旗帜"
    (chevron 倒三角)放编号 1-4;卡内容:icon → 标题 → 2 行说明;
    BRAND_PRIMARY 主色,旗帜用 ACCENT 高亮编号。
