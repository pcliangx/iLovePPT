id: pyramid-maslow-5
name: "Maslow 5 层金字塔"
category: hierarchy

layout_type: pyramid
variant: pyramid-5

content_intent:
  - 5 层金字塔,自下而上递增(底层最宽,顶层最窄)
  - 每层放层级名 + 简短说明
  - 经典 Maslow 需求层次(生理 / 安全 / 社交 / 尊重 / 自我实现)
when_to_use:
  - Maslow 需求层次
  - 任何"基础 → 高级 5 层递进"的层级结构
  - 强调"底层支撑上层"的层级关系
when_not_to_use:
  - 层数 ≠ 5(选 pyramid-3/4)
  - 没有"层级支撑"语义(改 cards-* / bullet)
  - 强调"漏斗收敛"而非层级(改 process-funnel-*)
keywords:
  - 金字塔
  - 5 层
  - Maslow
  - 需求层次
  - 马斯洛
  - hierarchy
  - 层级
  - 等级
  - 5 阶
  - 5 层级

matches_iloveppt_layout: null
fallback_rendering:
  method: diagram
  notes: |
    draw.io 推荐:5 个 trapezoid 堆叠,底层最宽,逐层收窄
    至顶层为三角(triangle);每层右侧挂层级名 + 说明文本;
    BRAND_PRIMARY 渐变(底层最深暗,顶层最亮)强化"上升"感。
