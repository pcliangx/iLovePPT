id: comparison-tier-3
name: "3 级对比(中间高亮)"
category: comparison

layout_type: comparison
variant: comparison-tier-3

content_intent:
  - 3 列并列对比(Basic / Pro / Enterprise 经典套餐对比)
  - 中间列加强(放大 / 加深底色 / 加 "推荐" 徽章)
  - 每列顶部标签 + 价格 + 特性 bullet 列表
when_to_use:
  - 3 档套餐 / 3 级会员 / 3 种 plan 对比
  - 3 种方案对比 + 推荐项突出
  - 3 个候选选项的特性 ✓/✗ 对比
when_not_to_use:
  - 对比列数 ≠ 3(选 comparison-2col / tier-4)
  - 是流程而非对比(改 process-* / timeline)
  - 没有"对比"语义,只是 3 卡片(改 cards-3-*)
keywords:
  - 3 列对比
  - 套餐对比
  - 价格对比
  - basic pro enterprise
  - tier
  - 3 档
  - 推荐套餐
  - 方案对比
  - 三级对比
  - pricing
  - plan 对比

matches_iloveppt_layout: null
fallback_rendering:
  method: diagram
  notes: |
    draw.io 推荐:3 个圆角矩形列横向并列,中间列宽度 110% + 上下加高
    + 顶部"推荐"徽章(用 ACCENT 色),其余两列宽度 90%;
    每列顶部标签(Basic / Pro / Enterprise)+ 中部大价格 + 下部 5-7 条
    ✓/✗ 特性 bullet;BRAND_PRIMARY 中间列填充加深。
