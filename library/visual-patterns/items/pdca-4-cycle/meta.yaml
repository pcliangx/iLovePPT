id: pdca-4-cycle
name: "PDCA 4 节点环形循环"
category: cycle

layout_type: process_flow
variant: process-cycle-4

content_intent:
  - 4 个节点环形布局(Plan / Do / Check / Act)
  - 节点间用顺时针弧形箭头连接,形成闭环
  - 中心可放主题词(如 "持续改进" / "PDCA")
when_to_use:
  - PDCA / 戴明环 / 持续改进
  - 4 节点循环工作法(SCRUM / Kaizen / OODA 等)
  - 强调"周而复始"的迭代关系
when_not_to_use:
  - 节点数 ≠ 4(选 process-cycle-3/5/6)
  - 节点是串行而非循环(改 process-arrow-* / timeline)
  - 没有"闭环"语义(改 cards-4-*)
keywords:
  - PDCA
  - Plan Do Check Act
  - 循环
  - 闭环
  - 持续改进
  - 戴明环
  - 4 节点
  - cycle
  - 戴明
  - Kaizen
  - 迭代

matches_iloveppt_layout: null
fallback_rendering:
  method: diagram
  notes: |
    draw.io 推荐:4 个 ellipse 节点放在矩形 4 角(12/3/6/9 点钟方向),
    用 4 段弧形 connector 顺时针串联;中心一个文本框放主题词;
    每节点配色用 4 色轮换(BRAND_PRIMARY → ACCENT → BRAND_DARK → BRAND_TINT)
    强化"轮换"语义。
