id: timeline-v-4
name: "纵向 4 阶段时间线"
category: process

layout_type: timeline
variant: timeline-v-4

content_intent:
  - 4 个阶段沿垂直方向自上而下展开
  - 每节点 1 个圆形编号 + 阶段标题 + 描述,左右交错排版
  - 节点间用垂直细线连接,中央贯穿
when_to_use:
  - 4 阶段流程纵向叙述(Q1 → Q2 → Q3 → Q4)
  - slide 内空间垂直方向充裕(避免横向拥挤)
  - 节点信息较长需多行展示
when_not_to_use:
  - 阶段数 ≠ 4(选对应 timeline-v-3/5/6)
  - 节点关系是循环(改 process-cycle-*)
  - 横屏空间充裕(改 timeline-h-*)
keywords:
  - 时间线
  - 时间轴
  - 纵向
  - 4 阶段
  - 4 步
  - 上下排列
  - timeline
  - 季度

matches_iloveppt_layout: null
fallback_rendering:
  method: diagram
  notes: |
    draw.io 推荐:slide 中央一条垂直细线,4 个圆节点等距分布
    (y 间隔 = slide_h / 5),节点左右交替挂标题 + 描述;
    节点编号 1-4 在圆内;BRAND_PRIMARY 配色,辅以 BRAND_TINT。
