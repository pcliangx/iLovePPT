id: timeline-h-5
name: "横向 5 阶段时间线"
category: process

layout_type: timeline
variant: timeline-h-5

content_intent:
  - 5 个阶段沿水平方向串行展开
  - 每节点 1 个圆形编号 + 阶段标题 + 简短描述
  - 节点间用水平细线连接,递进感强
when_to_use:
  - 项目 5 阶段时间轴(立项 → 调研 → 设计 → 实施 → 验收)
  - 5 步路线图(roadmap)横向展示
  - 5 个 milestone 串行排列(年/季度/月)
when_not_to_use:
  - 节点数 ≠ 5(选 timeline-h-3/4/6 等对应 variant)
  - 节点之间是循环关系(改用 process-cycle-*)
  - 阶段需呈现纵向上下排序(改用 timeline-v-*)
keywords:
  - 时间线
  - 时间轴
  - 横向
  - 5 阶段
  - 5 步
  - roadmap
  - milestone
  - timeline
  - 5 节点

matches_iloveppt_layout: null
fallback_rendering:
  method: diagram
  notes: |
    draw.io 推荐:水平 5 个 ellipse 节点等距分布(x 间隔 = slide_w / 6),
    节点间用 straight connector 串联;数字 1-5 放节点中心;
    标题在节点上方,描述在节点下方;主节点配色用 BRAND_PRIMARY,
    辅以 BRAND_TINT 弱化非焦点节点。
