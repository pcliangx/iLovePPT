id: venn-3-circle
name: "3 圆相交维恩图"
category: relationship

layout_type: venn
variant: venn-3

content_intent:
  - 3 个等大圆相交,形成 3 个独立 + 3 个 2 圆交集 + 1 个 3 圆交集
  - 每独立区域标主集名,中心交集标"核心 / 黄金组合"
  - 表达 3 集合之间的交集 / 共性 / 差异
when_to_use:
  - 3 个能力 / 3 个领域的交集分析(数据 + 设计 + 业务 = 产品经理)
  - 3 个角色 / 部门职责重叠分析
  - sweet spot / 黄金交叉点分析
when_not_to_use:
  - 圆数 ≠ 3(选 venn-2/4)
  - 集合无交集(改 cards-* / bullet)
  - 强调层级而非交集(改 pyramid-*)
keywords:
  - 维恩图
  - venn
  - 3 圆
  - 交集
  - 相交
  - 重叠
  - 共性
  - 三圆
  - sweet spot
  - 黄金交叉
  - 三集合

matches_iloveppt_layout: null
fallback_rendering:
  method: diagram
  notes: |
    draw.io 推荐:3 个等大 ellipse 部分相交(三角形布局,各圆中心
    成正三角形顶点);所有圆设置 fillOpacity=40-50% 让交集可见;
    3 个圆用 BRAND_PRIMARY / ACCENT / BRAND_DARK 三色区分;
    中心交集小区域标"核心"+ 加深底色强化焦点。
