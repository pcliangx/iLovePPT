    - on-boarding
    - 员工手册
    - 新人培训

training-workshop:
  description: 团建 / Workshop / OKR kickoff / 团队建设
  example_queries:
    - 团建
    - OKR kickoff
    - 团队建设
    - workshop

training-academic:
  description: 学术 / 教学讲座 / 学生作业
  example_queries:
    - 学术报告
    - 讲座
    - 课件
    - 毕业答辩

# === 创意类(细分 2 个,原来只 creative-modern)===
creative-brand:
  description: 品牌发布 / 创意 agency 提案 / 视觉秀场
  example_queries:
    - 品牌发布
    - 创意提案
    - moodboard
    - 设计师 pitch

creative-event:
  description: 活动 / 发布会 / launch
  example_queries:
    - 产品发布会
    - 活动 deck
    - 新品 launch

# === 公益 / 非营利类(新)===
nonprofit:
  description: 公益组织 / 社会企业 / NGO
  example_queries:
    - 公益项目
    - NGO 介绍
    - 社会企业
