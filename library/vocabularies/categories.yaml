# library/vocabularies/categories.yaml
# categories · 模板 / pattern category 受控词典 · meta.yaml.category 必须 enum
#
# 用途:
#   - meta.yaml.category 必须取下列 key 之一
#   - library/search.py 的 CATEGORY_HINTS 把触发词映射到这些 key
#   - inverse-category 软降权基于此(命中跟 brief.category 不符 → score × 0.85)
#
# 维护规则:
#   - 增 / 改 category → 同步 search.py 的 CATEGORY_HINTS + 走 bench 验证
#   - 不可删 category(已 ingest 的模板 retrofit 成本高)
#   - 每个 category 必填 description + example_queries(visual_signature 选填)

# === 企业类(细分 6 个,原来只 enterprise-modern)===
enterprise-finance:
  description: 财务报告 / CFO 简报 / 预算分析 / 财务路演
  visual_signature: 偏数据图表 + 财务专属 icon(箭头 / 增长曲线 / 钱币)
  example_queries:
    - 财务汇报
    - 财报
    - 净利润分析
    - 预算路演
    - CFO 简报

enterprise-corporate-report:
  description: 年度报告 / IPO 路演 / 投资人路演 / 战略发布
  visual_signature: 偏稳重深色 + 城市天际线 / 大气几何
  example_queries:
    - 年报
    - 年度报告
    - 上市路演
    - 投资人路演
    - 招股说明

enterprise-strategy:
  description: 战略分析 / SWOT / OKR / 工作计划 / 季度规划
  visual_signature: 偏 quadrant / 流程 / 几何商务
  example_queries:
    - SWOT 分析
    - OKR 规划
    - 工作计划
    - 战略路线图
    - 工作汇报

enterprise-product:
  description: 产品介绍 / 技术架构 / SaaS 演示 / Feature deck
  visual_signature: 偏 icon 线稿 / 蓝白产品风
  example_queries:
    - 产品介绍
    - 技术架构
    - SaaS 演示
    - feature deck
    - 白皮书

enterprise-sales:
  description: 销售提案 / 客户演示 / 商业方案
  visual_signature: 偏 emotional + CTA
  example_queries:
    - 销售提案
    - 客户演示
    - 商业方案
    - 成单 deck

enterprise-postmortem:
  description: 项目复盘 / Retrospective / 经验总结
  visual_signature: 偏 timeline / process / cards 列点
  example_queries:
    - 项目复盘
    - 回顾总结
    - retrospective
    - 经验沉淀

# === 培训类(细分 3 个,原来只 training)===
